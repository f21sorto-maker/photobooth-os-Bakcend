services:
  # ─── Shared Infrastructure ────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: photobooth-postgres
    restart: unless-stopped
    networks:
      - photobooth-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: photobooth-redis
    restart: unless-stopped
    networks:
      - photobooth-net
    volumes:
      - redis_data:/data
    command: >
      redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Twenty CRM ───────────────────────────────────────────────────────────
  twenty:
    image: twentycrm/twenty:latest
    container_name: photobooth-twenty
    restart: unless-stopped
    networks:
      - photobooth-net
    volumes:
      - twenty_data:/app/storage
    environment:
      SERVER_URL: https://crm.${DOMAIN_BASE}
      PG_DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/twenty_db
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      APP_SECRET: ${TWENTY_APP_SECRET}
      STORAGE_TYPE: local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Invoice Ninja Stack (dedicated MariaDB + nginx sidecar) ─────────────
  ninja-db:
    image: mariadb:11
    container_name: photobooth-ninja-db
    restart: unless-stopped
    command: >
      --innodb-buffer-pool-size=256M --innodb-log-file-size=64M --max-allowed-packet=128M --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - photobooth-net
    volumes:
      - ninja_db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${NINJA_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ninja
      MYSQL_USER: ninja
      MYSQL_PASSWORD: ${NINJA_DB_PASSWORD}
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  invoiceninja:
    image: invoiceninja/invoiceninja:5
    container_name: photobooth-invoiceninja
    restart: unless-stopped
    networks:
      - photobooth-net
    volumes:
      - ninja_public:/var/www/app/public
      - ninja_storage:/var/www/app/storage
    environment:
      APP_KEY: ${INVOICE_NINJA_APP_KEY}
      APP_URL: https://invoice.${DOMAIN_BASE}
      APP_DEBUG: "false"
      REQUIRE_HTTPS: "false"
      TRUSTED_PROXIES: "*"
      DB_CONNECTION: mysql
      DB_HOST: ninja-db
      DB_PORT: 3306
      DB_DATABASE: ninja
      DB_USERNAME: ninja
      DB_PASSWORD: ${NINJA_DB_PASSWORD}
      MAIL_MAILER: smtp
      MAIL_HOST: smtp-relay.brevo.com
      MAIL_PORT: 587
      MAIL_USERNAME: ${BREVO_SMTP_USER}
      MAIL_PASSWORD: ${BREVO_SMTP_PASS}
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: ${BUSINESS_OWNER_EMAIL}
      MAIL_FROM_NAME: ${BUSINESS_NAME}
      QUEUE_CONNECTION: sync
    depends_on:
      ninja-db:
        condition: service_healthy

  ninja-nginx:
    image: nginx:alpine
    container_name: photobooth-ninja-nginx
    restart: unless-stopped
    networks:
      - photobooth-net
    volumes:
      - ninja_public:/var/www/app/public:ro
      - ./ninja-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - invoiceninja

  # ─── DocuSeal ─────────────────────────────────────────────────────────────
  docuseal:
    image: docuseal/docuseal:latest
    container_name: photobooth-docuseal
    restart: unless-stopped
    networks:
      - photobooth-net
    volumes:
      - docuseal_data:/data
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/docuseal_db
      SECRET_KEY_BASE: ${DOCUSEAL_SECRET_KEY_BASE}
      HOST: https://contracts.${DOMAIN_BASE}
      FORCE_SSL: "false"
      SECRET_KEY: ${DOCUSEAL_WEBHOOK_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  # ─── InvenTree ────────────────────────────────────────────────────────────
  inventree:
    image: inventree/inventree:stable
    container_name: photobooth-inventree
    restart: unless-stopped
    networks:
      - photobooth-net
    volumes:
      - inventree_data:/home/inventree/data
      - inventree_static:/home/inventree/static
      # Patch: fix KeyError 'func' crash in check_existing_task (InvenTree 1.3.2 bug)
      - ./inventree-tasks-patch.py:/home/inventree/src/backend/InvenTree/InvenTree/tasks.py:ro
    environment:
      INVENTREE_DB_ENGINE: postgresql
      INVENTREE_DB_NAME: inventree_db
      INVENTREE_DB_HOST: postgres
      INVENTREE_DB_PORT: 5432
      INVENTREE_DB_USER: ${POSTGRES_USER}
      INVENTREE_DB_PASSWORD: ${POSTGRES_PASSWORD}
      INVENTREE_SECRET_KEY: ${INVENTREE_SECRET_KEY}
      INVENTREE_ADMIN_USER: ${INVENTREE_ADMIN_USER}
      INVENTREE_ADMIN_PASSWORD: ${INVENTREE_ADMIN_PASSWORD}
      INVENTREE_ADMIN_EMAIL: ${INVENTREE_ADMIN_EMAIL}
      # Required when running behind Caddy reverse proxy on https://inventory.<DOMAIN_BASE>
      INVENTREE_SITE_URL: https://inventory.${DOMAIN_BASE}
      INVENTREE_TRUSTED_ORIGINS: https://inventory.${DOMAIN_BASE}
      INVENTREE_CORS_ORIGIN_WHITELIST: https://inventory.${DOMAIN_BASE},https://dashboard.${DOMAIN_BASE}
      INVENTREE_CORS_ORIGIN_ALLOW_ALL: "false"
      INVENTREE_USE_X_FORWARDED_HOST: "true"
      INVENTREE_USE_X_FORWARDED_PROTO: "true"
      INVENTREE_COOKIE_SECURE: "true"
      INVENTREE_DEBUG: "false"
      INVENTREE_EMAIL_HOST: smtp-relay.brevo.com
      INVENTREE_EMAIL_PORT: 587
      INVENTREE_EMAIL_HOST_USER: ${BREVO_SMTP_USER}
      INVENTREE_EMAIL_HOST_PASSWORD: ${BREVO_SMTP_PASS}
      INVENTREE_EMAIL_SENDER: ${BUSINESS_OWNER_EMAIL}
      INVENTREE_EMAIL_USE_TLS: "true"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Listmonk ─────────────────────────────────────────────────────────────
  listmonk:
    image: listmonk/listmonk:latest
    container_name: photobooth-listmonk
    restart: unless-stopped
    networks:
      - photobooth-net
    volumes:
      - listmonk_data:/listmonk
    environment:
      LISTMONK_app__address: "0.0.0.0:9000"
      LISTMONK_db__host: postgres
      LISTMONK_db__port: "5432"
      LISTMONK_db__user: ${POSTGRES_USER}
      LISTMONK_db__password: ${POSTGRES_PASSWORD}
      LISTMONK_db__database: listmonk_db
      LISTMONK_db__ssl_mode: disable
    depends_on:
      postgres:
        condition: service_healthy

  # ─── n8n (Automation) ─────────────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: photobooth-n8n
    restart: unless-stopped
    networks:
      - photobooth-net
    ports:
      - "5678:5678" # Expose to host so browser forms can POST to http://localhost:5678
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n_db
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      # Public webhook URL — Cloudflare Tunnel (local) or Nginx (VPS) routes this to n8n:5678
      WEBHOOK_URL: ${N8N_PUBLIC_WEBHOOK_URL:-https://n8n.rewindmediaevents.com}
      N8N_HOST: automation.${DOMAIN_BASE}
      N8N_PROTOCOL: https
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
      N8N_EDITOR_BASE_URL: https://automation.${DOMAIN_BASE}
      # Allow workflow nodes to read env vars via {{$env.X}}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      # n8n v2.21+ requires explicit allow list
      N8N_ALLOW_ENVIRONMENT_ACCESS: "true"
      # External API keys exposed to workflows via {{$env.X}}
      EIA_API_KEY: ${EIA_API_KEY}
      EIA_STATE_CODE: ${EIA_STATE_CODE}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      DOCUSEAL_TEMPLATE_ID: ${DOCUSEAL_TEMPLATE_ID}
      LISTMONK_BOOKING_LIST_ID: ${LISTMONK_BOOKING_LIST_ID}
      LISTMONK_INQUIRY_LIST_ID: ${LISTMONK_INQUIRY_LIST_ID}
      BUSINESS_OWNER_EMAIL: ${BUSINESS_OWNER_EMAIL}
      DOMAIN_BASE: ${DOMAIN_BASE}
      # System-wide n8n email alerts
      N8N_EMAIL_METHOD: smtp
      N8N_EMAIL_SMTP_HOST: smtp-relay.brevo.com
      N8N_EMAIL_SMTP_PORT: 587
      N8N_EMAIL_SMTP_USER: ${BREVO_SMTP_USER}
      N8N_EMAIL_SMTP_PASSWORD: ${BREVO_SMTP_PASS}
      N8N_EMAIL_SMTP_SENDER: ${BUSINESS_OWNER_EMAIL}
      N8N_PROXY_HOPS: "1"
      N8N_DEFAULT_CORS: "true"
      N8N_CORS_ALLOW_ORIGIN: "*"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Cal.com (Booking Calendar) ────────────────────────────────────────────
  # Optional — you can use EITHER Cal.com OR Google Calendar (via n8n).
  # Cal.com provides a public booking page; Google Calendar is pure scheduling.
  # To disable, comment out this block and remove the Caddy route.
  calcom:
    image: calcom/cal.com:latest
    container_name: photobooth-calcom
    restart: unless-stopped
    # Cal.com has no ARM64 image — only starts on x86 or when explicitly requested:
    #   docker compose --profile calcom up -d
    # On Apple Silicon Macs, use Google Calendar via n8n instead (CALENDAR_PROVIDER=google).
    profiles: ["calcom"]
    networks:
      - photobooth-net
    volumes:
      - calcom_data:/app/data
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/calcom_db
      NEXTAUTH_SECRET: ${CALCOM_NEXTAUTH_SECRET}
      CALENDSO_ENCRYPTION_KEY: ${CALCOM_ENCRYPTION_KEY}
      NEXT_PUBLIC_WEBAPP_URL: https://calendar.${DOMAIN_BASE}
      NEXT_PUBLIC_LICENSE_CONSENT: "agree"
      # Connect Cal.com to Google Calendar via OAuth (same Google Cloud project)
      GOOGLE_API_CREDENTIALS: ${CALCOM_GOOGLE_API_CREDENTIALS:-}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Cloudflare Tunnel (Local Dev Only) ────────────────────────────────────
  # Exposes ONLY n8n to the public internet via n8n.rewindmediaevents.com.
  # On VPS: remove this service and use Nginx with SSL instead.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: photobooth-cloudflared
    restart: unless-stopped
    networks:
      - photobooth-net
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - n8n

  # ─── Caddy Reverse Proxy ──────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: photobooth-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    networks:
      - photobooth-net
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./dashboard:/srv/dashboard:ro
    depends_on:
      - twenty
      - ninja-nginx
      - docuseal
      - inventree
      - listmonk
      - n8n
      # calcom removed — behind 'calcom' profile (no ARM64 image for Apple Silicon)
    environment:
      DOMAIN_BASE: ${DOMAIN_BASE}

  # ─── Postgres Backups (auto daily) ────────────────────────────────────────
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: photobooth-backup
    restart: unless-stopped
    networks:
      - photobooth-net
    volumes:
      - ./backups:/backups
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: twenty_db,docuseal_db,inventree_db,listmonk_db,n8n_db
      SCHEDULE: "0 2 * * *"
      BACKUP_KEEP_DAYS: "14"
      BACKUP_KEEP_WEEKS: "8"
      BACKUP_KEEP_MONTHS: "12"
    depends_on:
      postgres:
        condition: service_healthy

networks:
  photobooth-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  twenty_data:
  ninja_public:
  ninja_storage:
  ninja_db_data:
  docuseal_data:
  inventree_data:
  inventree_static:
  listmonk_data:
  n8n_data:
  calcom_data:
  caddy_data:
  caddy_config:
